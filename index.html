<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>

<style>

/* ===== BASE ===== */
body {
  background: radial-gradient(circle at center, #000 0%, #050505 100%);
  height: 100vh;
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* ===== TITLE ===== */
.title {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 28px;
  letter-spacing: 2px;
}

/* ===== SOLAR SYSTEM CONTAINER ===== */
.solar-system {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  perspective: 1000px;
}

/* ===== PLANET STYLE ===== */
.planet {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  animation: rotate 20s linear infinite;
  transition: transform 1s ease;
}

/* ===== PLANET ROTATION ===== */
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== PLANET IMAGES ===== */
.mercury { background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg'); }
.venus { background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg'); }
.earth { background-image: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg'); }
.mars { background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg'); }
.jupiter { background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg'); }
.saturn { background-image: url('https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg'); }
.uranus { background-image: url('https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg'); }
.neptune { background-image: url('https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg'); }
.pluto { background-image: url('https://upload.wikimedia.org/wikipedia/commons/2/2a/Nh-pluto-in-true-color_2x_JPEG-edit-frame.jpg'); }

/* ===== PLANET POSITION ===== */
.planet {
  position: absolute;
  top: -60px;
  left: -60px;
}

</style>
</head>

<body>

<div class="title">🌌 Solar System Explorer</div>

<div class="solar-system">
  <div class="planet mercury"></div>
  <div class="planet venus"></div>
  <div class="planet earth"></div>
  <div class="planet mars"></div>
  <div class="planet jupiter"></div>
  <div class="planet saturn"></div>
  <div class="planet uranus"></div>
  <div class="planet neptune"></div>
  <div class="planet pluto"></div>
</div>

</body>
</html>
